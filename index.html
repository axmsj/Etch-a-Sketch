<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Etch a Sketch</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="index.js" defer></script>
  </head>
  <body>
    <h1 id="heading">Etch-a-Sketch</h1>
    <div id="mainContainer">
      <div id="menuContainer">
        <h1 class="underMenu">Menu</h1>
        <h3 class="underMenu">Colors: </h3>
        <div id="buttonMenu">
          <button id="colorsBtn">Colors</button>
          <button id="blackBtn">Black</button>
          <button id="opacityBtn">Opacity</button>
        </div>
        <h3 class="underMenu">Erase / Reset</h3>
        <div class="eraserResetContainer">
          <button id="eraserBtn">Eraser</button>
          <button id="resetBtn">Reset</button></div
        >
      </div>
      <div id="container"></div>
      
    </div>
  </body>
</html>
